<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">Animated terminal header for crubicleowner</title>
  <desc id="desc">A terminal-style profile banner showing whoami, builds, and stack commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset="0.52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#facc15" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="reveal1">
      <rect x="94" y="93" width="0" height="30" fill="#fff">
        <animate attributeName="width" values="0;150;150" dur="8s" repeatCount="indefinite"/>
      </rect>
    </mask>
    <mask id="reveal2">
      <rect x="94" y="129" width="0" height="30" fill="#fff">
        <animate attributeName="width" values="0;0;520;520" keyTimes="0;0.18;0.48;1" dur="8s" repeatCount="indefinite"/>
      </rect>
    </mask>
    <mask id="reveal3">
      <rect x="94" y="183" width="0" height="30" fill="#fff">
        <animate attributeName="width" values="0;0;112;112" keyTimes="0;0.42;0.58;1" dur="8s" repeatCount="indefinite"/>
      </rect>
    </mask>
    <mask id="reveal4">
      <rect x="94" y="219" width="0" height="30" fill="#fff">
        <animate attributeName="width" values="0;0;720;720" keyTimes="0;0.56;0.9;1" dur="8s" repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <rect width="1100" height="320" rx="26" fill="url(#bg)"/>
  <g opacity="0.16">
    <path d="M0 58H1100M0 116H1100M0 174H1100M0 232H1100M0 290H1100" stroke="#94a3b8"/>
    <path d="M86 0V320M172 0V320M258 0V320M344 0V320M430 0V320M516 0V320M602 0V320M688 0V320M774 0V320M860 0V320M946 0V320M1032 0V320" stroke="#94a3b8"/>
  </g>
  <rect x="-260" y="0" width="260" height="320" fill="url(#bar)" opacity="0.55">
    <animate attributeName="x" values="-260;1100" dur="5.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="955" cy="86" r="74" fill="#2dd4bf" opacity="0.12" filter="url(#softGlow)">
    <animate attributeName="r" values="62;78;62" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="892" cy="228" r="42" fill="#facc15" opacity="0.14" filter="url(#softGlow)">
    <animate attributeName="r" values="38;50;38" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(55 48)">
    <rect x="0" y="0" width="990" height="224" rx="16" fill="#020617" opacity="0.9" stroke="#334155"/>
    <rect x="0" y="0" width="990" height="42" rx="16" fill="#0f172a"/>
    <path d="M0 42H990" stroke="#334155"/>
    <circle cx="24" cy="21" r="6" fill="#fb7185"/>
    <circle cx="47" cy="21" r="6" fill="#facc15"/>
    <circle cx="70" cy="21" r="6" fill="#34d399"/>
    <text x="106" y="26" fill="#94a3b8" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="14">crubicleowner@github:~/profile</text>

    <g font-family="Consolas, Monaco, 'Courier New', monospace" font-size="22">
      <text x="38" y="75" fill="#facc15">$</text>
      <text x="64" y="75" fill="#e2e8f0" mask="url(#reveal1)">whoami</text>
      <text x="38" y="111" fill="#99f6e4" mask="url(#reveal2)">builder of practical AI-powered tools</text>

      <text x="38" y="165" fill="#facc15">$</text>
      <text x="64" y="165" fill="#e2e8f0" mask="url(#reveal3)">builds</text>
      <text x="38" y="201" fill="#bfdbfe" mask="url(#reveal4)">desktop apps | automation | infra | research workflows</text>
    </g>

    <rect x="770" y="74" width="160" height="76" rx="12" fill="#0f172a" stroke="#1e293b"/>
    <text x="790" y="104" fill="#94a3b8" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="13">stack</text>
    <text x="790" y="130" fill="#e2e8f0" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">TS | React</text>
    <text x="790" y="154" fill="#e2e8f0" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15">Python | Go</text>

    <rect x="38" y="207" width="10" height="24" fill="#2dd4bf">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="x" values="38;38;746;746" keyTimes="0;0.56;0.9;1" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
